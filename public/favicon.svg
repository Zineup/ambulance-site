<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <!-- Pure White Background -->
    <rect width="512" height="512" fill="#FFFFFF" rx="100" />
    
    <!-- Medical Cross (Background Element) -->
    <!-- Center the cross: X=256, Y=256 -->
    <!-- Thin, elegant cross in Medical Navy -->
    <rect x="236" y="100" width="40" height="312" fill="#1D3557" opacity="0.1" rx="10" />
    <rect x="100" y="236" width="312" height="40" fill="#1D3557" opacity="0.1" rx="10" />
    
    <!-- O K Monogram -->
    <g transform="translate(110, 290)">
        <!-- Beautiful, wide, modern O in Medical Navy -->
        <circle cx="80" cy="0" r="70" fill="none" stroke="#1D3557" stroke-width="36" />
        
        <!-- Sharp, geometric K in Urgent Red -->
        <!-- Vertical stem -->
        <rect x="180" y="-70" width="36" height="140" fill="#E63946" />
        <!-- Top arm -->
        <path d="M 216 -10 L 280 -70 L 330 -70 L 216 35 Z" fill="#E63946" />
        <!-- Bottom arm -->
        <path d="M 216 10 L 280 70 L 330 70 L 216 -35 Z" fill="#E63946" />
        
        <!-- Tiny Medical Cross acting as a period/accent -->
        <!-- Center at X=350, Y=50 -->
        <g transform="translate(340, 50)">
            <rect x="10" y="0" width="12" height="32" fill="#E63946" rx="4" />
            <rect x="0" y="10" width="32" height="12" fill="#E63946" rx="4" />
        </g>
    </g>
</svg>
